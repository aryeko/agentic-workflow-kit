version: "0.6.0"
paths:
  tracksDir: docs/tracks
  specsDir: docs/specs
  plansDir: docs/plans
  archiveDir: docs/tracks/archive
  prdsDir: docs/prds
statuses:
  eligible: [specced, plan-approved]
  inProgress: implementing
  complete: [done, verified]
tracker:
  idPattern: "^[A-Z]{2,}[0-9]+$"
verify:
  changed: null
  full: null
git:
  strategy: worktree
  branchPattern: "{track}/{id-lc}-{slug}"
  baseBranch: main
  commitOnBase: forbid
  worktreeDir: .worktrees
pr:
  create: true
  ci:
    wait: false
    command: null
  review:
    wait: none
    bot: none
    triageComments: false
    maxFixBatches: 1
    rerequestAfterFix: false
    waitTimeoutMinutes: 30
  merge:
    auto: true
    method: squash
    deleteBranch: true
implement:
  review:
    prePr:
      enabled: true
      mode: auto
      maxLoops: 2
      loopMode: incremental
    semanticChecks:
      enabled: true
  subagents:
    enabled: true
    maxParallel: 2
    allowWorkers: false
orchestrator:
  driver: codex-mcp
  maxParallel: 2
  stopLaunchingOnBlocked: true
  watch:
    enabled: false
    wait: false
    intervalMs: 300000
    timeoutMs: 300000
  childTimeoutMs: 1800000
  childNoProgressTimeoutMs: 1800000
  childStartupTimeoutMs: 60000
  childMaxRuntimeMs: 7200000
childSession:
  speed: derive
agents:
  profiles:
    storyImplementer:
      driver: codex-mcp
      model: null
      reasoning: medium
      approvalPolicy: never
      sandbox: workspace-write
      prompt:
        template: built-in/story-implementer
        variables:
          includeRepoInstructions: true
          includePrPolicy: true
          includeVerificationPolicy: true
      structuredOutput:
        schema: built-in/child-run-result
        required: true
      budget:
        wallMs:
          limit: 7200000
          warnAtPercent: 80
          action: checkpoint-stop
        tokens:
          limit: null
          warnAtPercent: 80
          action: stop-new-launches
        toolCalls:
          limit: null
          warnAtPercent: 80
          action: checkpoint-stop
        failedToolCalls:
          limit: null
          warnAtPercent: 80
          action: warn
      host: {}
    prePrReviewer:
      driver: codex-mcp
      model: null
      reasoning: medium
      approvalPolicy: null
      sandbox: null
      prompt:
        template: built-in/pre-pr-reviewer
        variables: {}
      structuredOutput:
        schema: built-in/review-result
        required: true
      budget: {}
      host: {}
    planner:
      driver: inline
      prompt:
        template: built-in/planner
        variables: {}
      structuredOutput:
        schema: built-in/planning-result
        required: false
      budget: {}
      host: {}
    analyzer:
      driver: inline
      prompt:
        template: built-in/analyzer
        variables: {}
      structuredOutput:
        schema: built-in/run-analysis
        required: true
      budget: {}
      host: {}
    recovery:
      driver: inline
      prompt:
        template: built-in/recovery
        variables: {}
      structuredOutput:
        schema: built-in/recovery-decision
        required: true
      budget: {}
      host: {}
  bindings:
    implementStory: storyImplementer
    prePrReview: prePrReviewer
    planTrack: planner
    analyzeRun: analyzer
    recoverRun: recovery
    migrateTracker: planner
