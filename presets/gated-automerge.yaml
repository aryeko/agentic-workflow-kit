version: 1
paths:
  tracksDir: docs/tracks
  specsDir: docs/specs
  plansDir: docs/plans
  archiveDir: docs/tracks/archive
  prdsDir: docs/prds
statuses:
  eligible: [specced, plan-approved]
  inProgress: implementing
  complete: [done, verified]
tracker:
  idPattern: "^[A-Z]{2,}[0-9]+$"
verify:
  changed: null
  full: null
git:
  strategy: worktree
  branchPattern: "{track}/{id-lc}-{slug}"
  baseBranch: main
  commitOnBase: forbid
  worktreeDir: .worktrees
pr:
  create: true
  ci:
    wait: true
    command: null
  review:
    wait: bot
    bot: codex
    triageComments: true
    maxFixBatches: 1
    rerequestAfterFix: false
    waitTimeoutMinutes: 30
  merge:
    auto: true
    method: squash
    deleteBranch: true
implement:
  review:
    prePr:
      enabled: true
      mode: auto
      maxLoops: 2
      loopMode: incremental
    semanticChecks:
      enabled: true
  subagents:
    enabled: true
    maxParallel: 2
    allowWorkers: false
orchestrator:
  driver: codex-mcp
  maxParallel: 2
  stopLaunchingOnBlocked: true
  childTimeoutMs: 1800000
  childNoProgressTimeoutMs: 1800000
  childMaxRuntimeMs: 7200000
