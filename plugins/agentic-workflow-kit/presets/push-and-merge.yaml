version: 1
paths:
  tracksDir: docs/tracks
  specsDir: docs/specs
  plansDir: docs/plans
  archiveDir: docs/tracks/archive
  prdsDir: docs/prds
statuses:
  eligible: [specced, plan-approved]
  inProgress: implementing
  complete: [done, verified]
tracker:
  idPattern: "^[A-Z]{2,}[0-9]+$"
verify:
  changed: null
  full: null
git:
  strategy: worktree
  branchPattern: "{track}/{id-lc}-{slug}"
  baseBranch: main
  commitOnBase: forbid
pr:
  create: true
  ci:
    wait: false
    command: null
  review:
    wait: none
    bot: none
    triageComments: false
  merge:
    auto: true
    method: squash
    deleteBranch: true
orchestrator:
  driver: codex-mcp
  maxParallel: 2
  stopLaunchingOnBlocked: true
