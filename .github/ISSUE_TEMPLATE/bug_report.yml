name: Bug report
description: Report kit-vnext behavior that is not working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, search existing issues and the v-next documentation: https://github.com/aryeko/agentic-workflow-kit/tree/v-next/docs

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what went wrong.
      placeholder: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reliably reproduce the problem.
      placeholder: |
        1. Check out v-next.
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Agent seam
        - Execution Host seam
        - Forge seam
        - Work Source seam
        - Foundation tooling or CI
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in the relevant versions.
      placeholder: |
        OS:
        Node version:
        pnpm version:
        Branch or commit:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant output. Redact secrets, tokens, and private credentials.
      render: shell
    validations:
      required: false
