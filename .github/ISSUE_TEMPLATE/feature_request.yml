name: Feature request
description: Propose a kit-vnext feature or improvement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check existing issues, GitHub Discussions, and the v-next design docs: https://github.com/aryeko/agentic-workflow-kit/tree/v-next/docs/design

  - type: textarea
    id: problem-motivation
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what workflow is currently painful?
      placeholder: I find myself repeatedly doing X because kit-vnext does not yet ...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the behavior, contract, or documentation change you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: Any other approaches you evaluated, and why you prefer this one.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Agent seam
        - Execution Host seam
        - Forge seam
        - Work Source seam
        - Foundation tooling or CI
        - Docs
        - Other
    validations:
      required: true
