version: 2

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: v-next
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    target-branch: v-next
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5
