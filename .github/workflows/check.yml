name: check

on:
  pull_request:
  push:
    branches:
      - main
      - v-next

jobs:
  # ── Required hermetic gate ─────────────────────────────────────────────────
  # Runs on every PR and push. Must pass before merge.
  # Does NOT run smoke-real (network/process-spawning) tests — those live in
  # the `smoke` job below, which is gated separately.
  check:
    # Job name == required status-check context "check" (matches v-next protection).
    name: check
    runs-on: ubuntu-latest
    env:
      PNPM_STORE_DIR: ${{ github.workspace }}/.pnpm-store
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: .pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm --store-dir "$PNPM_STORE_DIR" install --frozen-lockfile

      - name: Cache Turbo artifacts
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: check gate (format · lint · deps · typecheck · coverage:baseline)
        run: pnpm --config.store-dir="$PNPM_STORE_DIR" check

      - name: Pack dry-run (publishability check)
        run: pnpm --config.store-dir="$PNPM_STORE_DIR" pack:dry-run

  # ── Smoke lane (gated placeholder) ────────────────────────────────────────
  # This lane is inert until real drivers and the native containment helper
  # land. It currently has no tests and passes via passWithNoTests: true.
  # Activated automatically on configured branch pushes and on PRs labelled
  # "smoke". Do not add it to branch-protection required checks yet.
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    env:
      PNPM_STORE_DIR: ${{ github.workspace }}/.pnpm-store
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'smoke')
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: .pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm --store-dir "$PNPM_STORE_DIR" install --frozen-lockfile

      - name: smoke tests (real drivers + network — inert until packages land)
        run: pnpm --config.store-dir="$PNPM_STORE_DIR" test:smoke
