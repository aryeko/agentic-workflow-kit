interface:
  display_name: "Orchestrated Delivery"
  short_description: "Execute a ready package with dependency-gated story worktrees and track-branch merge-back"
  default_prompt: "Use $orchestrated-delivery only for an existing execution package that $plan-delivery marked ready_for_implementation. Verify package readiness, tracker rows, and packaged prompts first; refuse missing, incomplete, vague, or over-risk packages instead of repairing them. Bind only runtime/provider details, create per-story worktrees, dispatch the packaged implementer/reviewer prompts in dependency-gated waves under the same-logic rule, reuse each worker pair through fixes while the implementer commits each round in its story worktree, and on reviewer APPROVE merge the story's per-round commits back to the track branch and write the tracker (no orchestrator story-content commits). Cap the review loop at 5 rounds, then block and escalate that story while siblings continue. Stop after PR publication (track branch to v-next) unless I explicitly ask for review wait, merge, or cleanup."
