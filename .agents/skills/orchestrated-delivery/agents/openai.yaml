interface:
  display_name: "Orchestrated Delivery"
  short_description: "Execute a ready package with dependency-gated story worktrees and approved-story commits"
  default_prompt: "Use $orchestrated-delivery only for an existing execution package that $plan-delivery marked ready_for_implementation. Verify package readiness, tracker rows, and packaged prompts first; refuse missing, incomplete, vague, or over-risk packages instead of repairing them. Bind only runtime/provider details, create per-story worktrees, dispatch the packaged implementer/reviewer prompts in dependency-gated waves, reuse each worker pair through fixes, make one approved-story commit containing the approved story pathset and selected tracker row update, merge it back into the delivery worktree, and stop after PR publication unless I explicitly ask for review wait, merge, or cleanup."
